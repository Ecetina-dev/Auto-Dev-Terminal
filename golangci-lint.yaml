# golangci-lint configuration

run:
  timeout: 5m

# Using CLI: golangci-lint run --disable-all -E errcheck,gofmt,goimports,misspell,unused

linters:
  disable-all: true
  enable:
    - errcheck
    - gofmt
    - goimports
    - misspell
    - unused

linters-settings:
  errcheck:
    check-type-assertions: true
    check-blank: true

issues:
  exclude-use-default: false
